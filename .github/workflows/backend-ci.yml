name: Backend CI Check

on:
  push:
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build backend (syntax/bytecode check)
        working-directory: backend
        run: python -m compileall -q .

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./ci_test.db
          SESSION_SECRET_KEY: ci-secret
          GOOGLE_CLIENT_ID: ci-client-id
          GOOGLE_CLIENT_SECRET: ci-client-secret
          GEMINI_API_KEY: ci-gemini-key
        run: pytest -q

  backend-docker-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t momoney-backend:ci ./backend

      - name: Export Docker image as artifact
        run: docker save momoney-backend:ci | gzip > momoney-backend-ci.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: momoney-backend-ci-image
          path: momoney-backend-ci.tar.gz

  backend-docker-test:
    name: Backend Docker Test
    runs-on: ubuntu-latest
    needs: backend-docker-build

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: momoney-backend-ci-image

      - name: Load Docker image
        run: gunzip -c momoney-backend-ci.tar.gz | docker load

      - name: Run backend container for smoke test
        run: |
          docker run -d --name momoney-backend-ci \
            -p 8080:80 \
            -e DATABASE_URL=sqlite:///./ci_test.db \
            -e SESSION_SECRET_KEY=ci-secret \
            -e GOOGLE_CLIENT_ID=ci-client-id \
            -e GOOGLE_CLIENT_SECRET=ci-client-secret \
            -e GEMINI_API_KEY=ci-gemini-key \
            momoney-backend:ci

      - name: Wait for container startup
        run: sleep 5

      - name: Verify backend endpoint
        run: curl --fail --silent --show-error http://127.0.0.1:8080/docs > /dev/null

      - name: Print container logs
        if: always()
        run: docker logs momoney-backend-ci

      - name: Cleanup container
        if: always()
        run: docker rm -f momoney-backend-ci

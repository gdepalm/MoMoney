name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/momoney-backend

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./ci_test.db
          SESSION_SECRET_KEY: ci-secret
          GOOGLE_CLIENT_ID: ci-client-id
          GOOGLE_CLIENT_SECRET: ci-client-secret
          GEMINI_API_KEY: ci-gemini-key
        run: uv run pytest -q

  backend-docker-build-test:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t momoney-backend:ci ./backend

      - name: Run container
        run: |
          docker run -d --name momoney-backend-ci \
            -p 8000:8000 \
            -e DATABASE_URL=sqlite:///./ci_test.db \
            -e SESSION_SECRET_KEY=ci-secret \
            -e GOOGLE_CLIENT_ID=ci-client-id \
            -e GOOGLE_CLIENT_SECRET=ci-client-secret \
            -e GEMINI_API_KEY=ci-gemini-key \
            momoney-backend:ci

      - name: Wait for startup
        run: sleep 5

      - name: Smoke test
        run: curl --fail --silent --show-error http://127.0.0.1:8000/health

      - name: Print logs
        if: always()
        run: docker logs momoney-backend-ci

      - name: Cleanup
        if: always()
        run: docker rm -f momoney-backend-ci

  backend-push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: backend-docker-build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/momoney-backend:latest
            ghcr.io/${{ github.repository_owner }}/momoney-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/momoney-backend:latest
          cache-to: type=inline